# ------------------------------------------------------------
# SCHEMA — Field definitions (reference)
# ------------------------------------------------------------
# id:                  Unique identifier. Format: GAP-{CATEGORY}-{NNN}
#                      Categories: INFRA | DOC | ORG | MIND | PRINCIPLE
# type:                Gap type (see type_enum below)
# component:           Name of affected component
# path:                Filesystem path of affected component
# description:         What is wrong and why it matters
# priority:            critical | high | medium | low
# recommended_action:  Exact next action to resolve
# identified_by:       Who/what found this gap
# identified_on:       ISO date
# resolved_on:         ISO date when resolved, or null
# status:              open | in_progress | resolved | wont_fix

# type_enum:
#   meta_layer_missing:    A required .neo/ layer component doesn't exist
#   doc_inconsistency:     Documentation number/claim doesn't match repo reality
#   undocumented_agent:    Agent exists in repo but is absent from org documentation
#   missing_component:     Required file/directory doesn't exist yet
#   mind_incomplete:       Mind pipeline missing required stage output
#   principle_at_risk:     Setup that could lead to principle violation
#   squad_incomplete:      Squad missing required structure

# compliance_score formula (calculated by Neo on *health):
#   base: 100
#   deductions: critical=-10 | high=-5 | medium=-2 | low=-1
#   open_gaps_only: resolved gaps do not deduct
#   floor: 0

