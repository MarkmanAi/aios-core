schema: 1
story: "24.1"
story_title: "SelfLearner Trigger — Extend synapse-precompact.js to chain SelfLearner.run()"
gate: FAIL
status_reason: >
  Critical API mismatch: hook calls SelfLearner.run() on the module export object instead of
  a class instance. Results in TypeError silenced by catch — SelfLearner never executes at runtime.
  AC-2 is not functionally met despite tests passing (tests mock the wrong API shape).
reviewer: "Quinn (Test Architect)"
updated: "2026-03-16T00:00:00Z"

top_issues:
  - id: CR-24.1-1
    severity: high
    title: "Wrong API usage — SelfLearner.run() called on exports object, not class instance"
    file: ".claude/hooks/synapse-precompact.js"
    line: 36-61
    description: >
      self-learner.js exports { SelfLearner, createSelfLearner, ... } — not the class directly.
      run() is an instance method, not static. Current code: `const SelfLearner = require(path);
      await SelfLearner.run(projectDir)` throws TypeError at runtime, silently caught.
    fix: >
      const { SelfLearner } = require(SELF_LEARNER_PATH);
      const learner = new SelfLearner(context.projectDir);
      await learner.run();
    suggested_owner: dev

  - id: CR-24.1-2
    severity: high
    title: "Unit tests mock wrong API shape — mask the runtime bug"
    file: "tests/unit/hooks/synapse-precompact.test.js"
    line: 37-39
    description: >
      Mock returns { run: fn } which matches the (incorrect) hook usage.
      Tests pass but do not validate the actual module API. Must use
      named export + constructor pattern to match reality.
    fix: >
      const MockSelfLearner = jest.fn().mockImplementation(() => ({ run: mockSelfLearnerRun }));
      jest.doMock(SELF_LEARNER_PATH, () => ({ SelfLearner: MockSelfLearner }));
      // Add: expect(MockSelfLearner).toHaveBeenCalledWith(process.cwd())
    suggested_owner: dev

