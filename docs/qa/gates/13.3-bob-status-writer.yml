schema: 1
story: '13.3'
story_title: 'BobStatusWriter — Dashboard Bridge'
gate: CONCERNS
status_reason: >
  All 5 ACs correctly implemented and tested (56 tests, 0 failures). M1 fixed since prior review.
  Gate remains CONCERNS due to 2 open medium-severity issues: shallow copy in getStatus() (M2)
  and temp file placed in os.tmpdir() instead of dashboardDir (M3, spec deviation).
reviewer: 'Quinn (Test Architect)'
updated: '2026-03-07T00:00:00-03:00'

top_issues:
  - id: M2
    severity: medium
    title: 'getStatus() returns shallow copy — nested refs shared'
    description: >
      { ...this._status } only copies top-level keys. Nested objects (orchestration, pipeline,
      current_agent, etc.) are shared references. A consumer that mutates status.pipeline.stages
      corrupts internal state. Pre-existing behavior.
    file: '.aios-core/core/orchestration/bob-status-writer.js'
    lines: '496'
    suggested_owner: dev
    pre_existing: true

  - id: M3
    severity: medium
    title: 'Temp file in os.tmpdir() — non-atomic on Windows cross-drive'
    description: >
      The story spec called for a same-directory temp file (${targetPath}.tmp.${pid}) to
      guarantee atomic rename on same filesystem. Using os.tmpdir() causes fs.rename() to fail
      on Windows when project is on a different drive, falling back to non-atomic writeJson.
      Functional fallback exists but atomicity guarantee is lost.
    file: '.aios-core/core/orchestration/bob-status-writer.js'
    lines: '235-243'
    suggested_owner: dev
    pre_existing: false

  - id: L1
    severity: low
    title: 'Stale JSDoc (AC6) references'
    description: >
      updateAgent, addTerminal, recordSurfaceDecision, addError all have @param docs referencing
      "(AC6)" — leftover from pre-formal-story numbering. This story has 5 ACs (AC-1 through AC-5).
    file: '.aios-core/core/orchestration/bob-status-writer.js'
    suggested_owner: dev
    pre_existing: true

  - id: L2
    severity: low
    title: 'BOB_STATUS_SCHEMA comment references AC9'
    description: >
      BOB_STATUS_SCHEMA JSDoc says "(AC9: Single source of truth)" but this story only has
      ACs 1-5. Stale reference from original code.
    file: '.aios-core/core/orchestration/bob-status-writer.js'
    lines: '535-543'
    suggested_owner: dev
    pre_existing: true

  - id: L3
    severity: low
    title: 'initialize() dir-failure path not tested'
    description: >
      initialize() calls fs.ensureDir() directly (outside writeBobStatus). If ensureDir fails
      there, it throws without the descriptive message added by writeBobStatus. AC-1 dir-failure
      test only covers the writeBobStatus path.
    file: 'tests/core/orchestration/bob-status-writer.test.js'
    suggested_owner: dev
    pre_existing: false

closed_issues:
  - id: M1
    severity: medium
    title: 'writeBobStatus mutated caller state object'
    resolution: >
      Fixed: writeBobStatus() now clones the input before modifying timestamp/elapsed fields:
      const payload = { ...state, elapsed: { ...state.elapsed } }. Non-mutation test added.
    closed_date: '2026-03-07'

