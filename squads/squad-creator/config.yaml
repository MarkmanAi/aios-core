name: squad-creator
version: 4.0.0
short-title: Squad Creator
description: >-
  Unified squad for creating, cloning, optimizing, and validating AIOS squads.
  Includes mind cloning via DNA extraction, specialist delegation, model routing,
  advanced optimization, quality gates, and full squad creation pipeline.
  Result of fusion: squad-creator (base) + squad-creator-pro (advanced).
author: AIOS Team
slashPrefix: squadCreator
tested: true
updated_at: "2026-03-10"

# Activation settings - controls what displays when agent is activated
settings:
  activation:
    show_ecosystem_report: true
    show_greeting: true
    show_quick_commands: true

  ecosystem_report:
    show_totals: true
    show_top_squads: true
    show_quality_refs: true
    show_gaps: false
    top_squads_limit: 5

# Feature manifest (absorbed from squad-creator-pro)
features:
  base-creation:
    description: "Core squad creation pipeline with templates and scaffolding"
    agents: ["squad-architect", "sop-extractor"]
    tasks:
      - create-squad
      - create-agent
      - create-task
      - create-template
      - create-workflow
      - validate-squad
      - install-commands
      - sync-ide-command
      - refresh-registry
      - squad-analytics
      - qa-after-creation

  mind-cloning:
    description: "Clone real expert minds into AI agents via DNA extraction"
    agents: ["oalanicolas"]
    tasks:
      - collect-sources
      - extract-voice-dna
      - extract-thinking-dna
      - extract-knowledge
      - extract-implicit
      - extract-sop
      - validate-extraction
      - update-mind
      - an-extract-dna
      - an-fidelity-score
      - an-validate-clone
      - an-clone-review
      - an-design-clone
      - an-diagnose-clone
      - an-assess-sources
      - an-extract-framework
    workflows:
      - wf-clone-mind
      - wf-extraction-pipeline

  research:
    description: "Deep research and source acquisition for mind cloning"
    tasks:
      - an-compare-outputs
      - deep-research-pre-agent
      - auto-acquire-sources
    workflows:
      - wf-mind-research-loop
      - wf-research-then-create-agent
      - wf-auto-acquire-sources

  advanced-creation:
    description: "Advanced squad creation with full tool discovery and fusion"
    tasks:
      - parallel-discovery
      - squad-fusion
      - deconstruct
    workflows:
      - wf-create-squad
      - wf-context-aware-create-squad
      - wf-discover-tools
      - wf-squad-fusion
      - wf-brownfield-upgrade-squad

  optimization:
    description: "Squad and workflow optimization via axioma assessment"
    agents: ["pedro-valerio"]
    tasks:
      - optimize
      - optimize-workflow
      - find-0.8
    workflows:
      - wf-optimize-squad

  model-routing:
    description: "Intelligent model selection per task complexity"
    tasks:
      - qualify-task
      - lookup-model
      - smoke-test-model-routing
    workflows:
      - wf-model-tier-qualification
      - wf-cross-provider-qualification

  quality:
    description: "Advanced quality gates, axioma assessment, audit"
    agents: ["pedro-valerio"]
    tasks:
      - pv-axioma-assessment
      - pv-audit
      - pv-modernization-score
      - workspace-integration-hardening
    workflows:
      - validate-squad
      - wf-workspace-integration-hardening
      - modules/module-discovery
      - modules/module-integration
      - modules/module-quality-gates

  strategy:
    description: "Business strategy and marketing intelligence"
    agents: ["thiago_finch"]

  maintenance:
    description: "Maintenance and migration tasks"
    tasks:
      - sync-chief-codex-skill
      - migrate-workflows-to-yaml

workspace_integration:
  level: read_write
  rationale: >-
    Orchestration reads workspace artifacts and can publish integration
    contracts/templates for squads generated by the pipeline.
  read_paths:
    - workspace/
    - workspace/_templates/
    - workspace/domains/
  write_paths:
    - workspace/_templates/
    - workspace/domains/
  template_namespace: squad-governance

metadata:
  version: "4.0.0"
  fusion_date: "2026-03-10"
  fusion_sources:
    - squad-creator v1.2.0
    - squad-creator-pro v3.1.0
  stats:
    agents: 5
    tasks: 48
    workflows: 20
    configs: 8
    checklists: 10
    templates: 10
    scripts: 22
    test_scripts: 13
    data_files: 30
    minds: 2
    benchmarks: 1
    assessments: 1
    docs: 19
